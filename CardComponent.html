<!-- 
  CardComponent.html
  Template for the dashboard gems.
-->
<template id="cardTemplate">
  <div class="card">
    <div class="badge badge-upcoming hidden">Próximamente</div>
    <div class="card-icon"></div>
    <div class="card-content">
      <h3 class="card-title"></h3>
      <p class="card-description"></p>
    </div>
    <div class="card-footer">
      <button class="btn-see-more">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"></circle><path d="M12 16v-4"></path><path d="M12 8h.01"></path></svg>
        Detalles
      </button>
      <a href="#" class="card-action" target="_blank">
        <span>Explorar</span>
        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h14"></path><path d="m12 5 7 7-7 7"></path></svg>
      </a>
    </div>
  </div>
</template>
